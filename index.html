<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA DASHBOARD 🎬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <style>
        /* Временные стили для отладки */
        .dashboard-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="theater-curtain">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>
    
    <header class="cinema-header">
        <h1 class="cinema-title">
            <span class="title-glow">🎬 BACKSTAGE</span> PASS
        </h1>
        <p class="subtitle">your personal cinema dashboard</p>
    </header>
    
    <main>
        <div class="dashboard-controls">
            <button class="cinema-btn" data-add="search">🎥 FIND MOVIE</button>
            <button class="cinema-btn" data-add="watchlist">📋 WATCHLIST</button>
        </div>
        
        <div id="dashboard-container" class="dashboard-grid">
            <!-- Виджеты будут добавляться сюда -->
        </div>
    </main>
    
    <footer class="cinema-footer">
        <p>⭐ where every click is a premiere ⭐</p>
    </footer>
    
    <script type="module" src="main.js"></script>
</body>
</html>
